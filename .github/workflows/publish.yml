name: Regenerate SDK

on:
  release:
    types: [published] # Triggers when you publish a new GitHub Release
  workflow_dispatch: # Allows manual trigger

permissions:
  id-token: write  # required for OIDC trusted publishing
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Regenerate SDK
        run: |
          mkdir -p generated && npx @hey-api/openapi-ts \
            -c @hey-api/client-fetch \
            -i https://raw.githubusercontent.com/binlookupapi/binlookupapi-ts-sdk/refs/heads/main/openapi.yaml \
            -o gen

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: regenerate SDK from OpenAPI spec"
          git pull --rebase
          git push

      - name: Publish to npm (if version bumped)
        run: npm publish --access public
